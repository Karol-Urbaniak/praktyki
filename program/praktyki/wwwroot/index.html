<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>VIES Verify</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>Weryfikacja NIP (VIES)</h2>
    <div id="main">
        <div>
            <input type="text" id="countryInput" placeholder="Kraj (np. PL)" required>
            <input type="text" id="nipInput" placeholder="NIP" required>
            <button onclick="handleVerifyVies()">Sprawdź</button>
        </div>
        <div id="result" class="result-box" display="none">
            <p><strong>Firma:</strong> <span id="outName"></span></p>
            <p><strong>Adres:</strong> <span id="outAddress"></span></p>
            <p><strong>Status:</strong> <span id="outStatus"></span></p>
        </div>
    </div>
    <script>
        async function sprawdzNip() {
            const country = document.getElementById('countryInput').value;
            const nip = document.getElementById('nipInput').value;

            const response = await fetch(`/api/VerifyVies/${country}/vat/${nip}`);

            const data = await response.json();
            document.getElementById('result').style.display = 'block';
            document.getElementById('outName').innerText = data.name;
            document.getElementById('outAddress').innerText = data.address;
            document.getElementById('outStatus').innerText = data.isValid ? "AKTYWNY" : "NIEAKTYWNY";
        }

        async function handleVerifyVies() {
            const country = document.getElementById('countryInput').value;
            const nip = document.getElementById('nipInput').value;

            if (!nip || !country) return alert("Brak NIP lub kodu kraju!");
            const statusCell = document.getElementById(`result`);
            try {
                const response = await fetch(`/api/VerifyVies/${country}/vat/${nip}`);
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('result').style.display = 'block';
                    document.getElementById('outName').innerText = data.name;
                    document.getElementById('outAddress').innerText = data.address;
                    document.getElementById('outStatus').innerText = data.isValid ? "AKTYWNY" : "NIEAKTYWNY";
                } else { statusCell.innerText = "Błąd"; }
            } catch (error) { console.error(error); }
        }
    </script>
</body>
</html>
